tasksh:
- name: white 4x2 brick
  grasp_spin: 90           # 保持 90 度抓取策略
  blueprint_yaw: 90        # 蓝图原始角度改为 90
  pick:
    pos: [0.5, 0.0, 0.435]
    # 对应绝对 Yaw = 90° 且 Rx = 180° 的状态位姿四元数 [x, y, z, w]
    orientation: [0.7071068, 0.7071068, 0.0, 0.0] 
  place:
    pos: [0.0, 0.0, 0.015]
    orientation: [0, 0, 90] # 放置目标角度改为 90
  id: 0

- name: blue 2x2 brick
  grasp_spin: 90
  blueprint_yaw: -45
  pick:
    pos: [0.5, 0.0, 0.435]
    # 对应绝对 Yaw = -45° 且 Rx = 180° 的状态位姿四元数
    orientation: [0.9238795, -0.3826834, 0.0, 0.0]
  place:
    pos: [0.0, -0.016, 0.045]
    orientation: [0, 0, -45]
  id: 1

- name: blue 2x2 brick
  grasp_spin: 90
  blueprint_yaw: -45
  pick:
    pos: [0.5, 0.0, 0.435]
    orientation: [0.9238795, -0.3826834, 0.0, 0.0]
  place:
    pos: [0.0, 0.016, 0.045]
    orientation: [0, 0, -45]
  id: 2

- name: yellow 4x2 brick
  grasp_spin: 0
  blueprint_yaw: 90
  pick:
    pos: [0.5, 0.0, 0.435]
    orientation: [1.0, 0.0, 0.0, 6.123233995736766e-17]
  place:
    pos: [0.0, 0.0, 0.075]
    orientation: [0, 0, 90]
  id: 3

- name: white 4x2 brick
  grasp_spin: 0
  blueprint_yaw: 0
  pick:
    pos: [0.5, 0.0, 0.435]
    orientation: [1.0, 0.0, 0.0, 6.123233995736766e-17]
  place:
    pos: [0.0, 0.0, 0.105]
    orientation: [0, 0, 0]
  id: 4