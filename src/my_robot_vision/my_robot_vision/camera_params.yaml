# 摆放位置：机械臂前方 0.5m, 右侧 0.2m, 高 0.6m
# 姿态：垂直向下看，相机长边平行于机械臂 X 轴
extrinsic_matrix:
  - [  1.0000,  0.0000,  0.0000,  0.500 ]  # X_cam = X_base
  - [  0.0000, -1.0000,  0.0000, -0.200 ]  # Y_cam = -Y_base
  - [  0.0000,  0.0000, -1.0000,  0.600 ]  # Z_cam = -Z_base
  - [  0.0000,  0.0000,  0.0000,  1.0000 ]